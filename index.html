<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Удостоверение личности</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Основные стили */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
        body { background-color: #fff; color: #4a4a4a; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        .container { min-height: 100vh; display: flex; flex-direction: column; }

        /* Шапка */
        .header { padding: 10px 16px; border-bottom: 1px solid #f2f2f2; }
        .title-bar { display: flex; align-items: center; justify-content: center; position: relative; height: 44px; }
        .back-icon { position: absolute; left: 0; height: 18px; cursor: pointer; }
        .text-title { font-size: 18px; font-weight: 500; color: #333; }

        /* Табы */
        .tabs-container { padding: 15px 16px; }
        .tabs-wrapper { display: flex; background: #eee; border-radius: 10px; padding: 2px; }
        .tab-btn { flex: 1; text-align: center; padding: 10px 0; font-size: 14px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        input[type="radio"] { display: none; }
        #tab1:checked ~ .tabs-wrapper label[for="tab1"],
        #tab2:checked ~ .tabs-wrapper label[for="tab2"] { background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight: 500; }

        /* Контент вкладок */
        .tab-content { display: none; flex-grow: 1; padding: 0 16px; }
        #tab1:checked ~ #content-doc, #tab2:checked ~ #content-req { display: flex; flex-direction: column; }

        /* Зона загрузки и превью */
        #preview-container {
            width: 100%;
            height: 60vh;
            margin-top: 10px;
            background: #f9f9f9;
            border-radius: 12px;
            overflow: hidden; /* Важно для зума */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }
        #preview-img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 8px;
            will-change: transform;
            transform-origin: center;
        }
        .upload-btn-label {
            padding: 12px 24px;
            background: #2b6bcc;
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        /* Список реквизитов */
        .rekvizit-list { list-style: none; margin-bottom: 100px; }
        .rekvizit-item { border-bottom: 1px solid #f2f2f2; padding: 10px 0; position: relative; }
        .rekvizit-item label { display: block; color: #a8a8a8; font-size: 12px; margin-bottom: 4px; }
        .rekvizit-item input { width: 90%; border: none; font-size: 17px; color: #333; outline: none; background: transparent; }
        .copy-icon { position: absolute; right: 0; bottom: 12px; width: 20px; opacity: 0.6; }

        /* Кнопки в футере */
        .footer { padding: 20px 16px; margin-top: auto; }
        .btn-main { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 16px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; cursor: pointer; }
        .btn-blue { background: #2b6bcc; color: #fff; }
        .btn-outline { background: #fff; color: #2b6bcc; border: 1px solid #2b6bcc; }
        .btn-main img { height: 20px; }

        /* Модальное окно QR */
        .qr-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; z-index: 1000; align-items: flex-end; }
        .qr-overlay.open { display: flex; }
        .qr-sheet { width: 100%; background: #fff; border-radius: 20px 20px 0 0; padding: 20px; transform: translateY(100%); transition: 0.3s; }
        .qr-overlay.open .qr-sheet { transform: translateY(0); }
        .qr-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .qr-content { text-align: center; padding-bottom: 40px; }
        .qr-img { width: 180px; margin: 20px 0; }
        .qr-code-text { font-size: 32px; font-weight: 700; letter-spacing: 5px; }
    </style>
</head>
<body>

<div class="container">
    <!-- Переключатели вкладок через скрытые radio -->
    <input type="radio" id="tab1" name="main-tab" checked>
    <input type="radio" id="tab2" name="main-tab">

    <div class="header">
        <div class="title-bar">
            <img src="arrow.png" class="back-icon" alt="Назад">
            <span class="text-title">Удостоверение личности</span>
        </div>
    </div>

    <div class="tabs-container">
        <div class="tabs-wrapper">
            <label for="tab1" class="tab-btn">Документ</label>
            <label for="tab2" class="tab-btn">Реквизиты</label>
        </div>
    </div>

    <!-- Вкладка 1: Документ -->
    <div id="content-doc" class="tab-content">
        <div id="preview-container">
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            <label for="file-input" id="upload-label" class="upload-btn-label">Загрузить фото</label>
            <img id="preview-img" src="" alt="" style="display: none;">
        </div>

        <div class="footer">
            <button class="btn-main btn-blue" id="show-qr">
                <img src="qr.png" alt=""> Предъявить документ
            </button>
            <button class="btn-main btn-outline" id="share-doc">
                <img src="upload.png" alt=""> Отправить документ
            </button>
        </div>
    </div>

    <!-- Вкладка 2: Реквизиты -->
    <div id="content-req" class="tab-content">
        <ul class="rekvizit-list">
            <li class="rekvizit-item"><label>ФИО</label><input type="text" data-id="fio"><img src="copy.png" class="copy-icon"></li>
            <li class="rekvizit-item"><label>ИИН</label><input type="text" data-id="iin"><img src="copy.png" class="copy-icon"></li>
            <li class="rekvizit-item"><label>Дата рождения</label><input type="text" data-id="bday"><img src="copy.png" class="copy-icon"></li>
            <li class="rekvizit-item"><label>Номер документа</label><input type="text" data-id="docnum"><img src="copy.png" class="copy-icon"></li>
            <li class="rekvizit-item"><label>Дата выдачи</label><input type="text" data-id="date1"><img src="copy.png" class="copy-icon"></li>
            <li class="rekvizit-item"><label>Срок действия</label><input type="text" data-id="date2"><img src="copy.png" class="copy-icon"></li>
        </ul>
        <div class="footer">
            <button class="btn-main btn-outline" id="share-req">
                <img src="upload.png" alt=""> Отправить реквизиты
            </button>
        </div>
    </div>
</div>

<!-- Модальное окно QR -->
<div class="qr-overlay" id="qr-modal">
    <div class="qr-sheet">
        <div class="qr-header">
            <h3>Удостоверение личности</h3>
            <span id="close-qr" style="font-size: 24px; cursor: pointer;">&times;</span>
        </div>
        <div class="qr-content">
            <p>Покажите QR-код сотруднику</p>
            <img src="https://qci.qr-code.click/uploads/qr_codes/98Heo8.svg" class="qr-img">
            <p style="color: #999;">или скажите код</p>
            <div class="qr-code-text">080824</div>
        </div>
    </div>
</div>

<script>
    // --- ЗАГРУЗКА ФОТО И СОХРАНЕНИЕ ---
    const fileInput = document.getElementById('file-input');
    const previewImg = document.getElementById('preview-img');
    const uploadLabel = document.getElementById('upload-label');

    // Загрузка из памяти при старте
    const savedImg = localStorage.getItem('user_id_img');
    if (savedImg) {
        previewImg.src = savedImg;
        previewImg.style.display = 'block';
        uploadLabel.style.display = 'none';
    }

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const base64 = event.target.result;
                localStorage.setItem('user_id_img', base64);
                previewImg.src = base64;
                previewImg.style.display = 'block';
                uploadLabel.style.display = 'none';
                resetZoom();
            };
            reader.readAsDataURL(file);
        }
    });

    // --- СОХРАНЕНИЕ ПОЛЕЙ ВВОДА ---
    document.querySelectorAll('.rekvizit-item input').forEach(input => {
        const id = input.getAttribute('data-id');
        input.value = localStorage.getItem('req_' + id) || '';
        input.addEventListener('input', () => {
            localStorage.setItem('req_' + id, input.value);
        });
    });

    // --- МОДАЛЬНОЕ ОКНО ---
    const qrModal = document.getElementById('qr-modal');
    document.getElementById('show-qr').onclick = () => qrModal.classList.add('open');
    document.getElementById('close-qr').onclick = () => qrModal.classList.remove('open');
    qrModal.onclick = (e) => { if(e.target === qrModal) qrModal.classList.remove('open'); };

    // --- ПИНЧ-ЗУМ И ПЕРЕМЕЩЕНИЕ ---
    let scale = 1, lastScale = 1;
    let posX = 0, posY = 0, startX = 0, startY = 0, dist = 0;
    const container = document.getElementById('preview-container');

    function resetZoom() {
        scale = 1; posX = 0; posY = 0;
        previewImg.style.transform = `translate(0,0) scale(1)`;
    }

    container.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            lastScale = scale;
        } else {
            startX = e.touches[0].pageX - posX;
            startY = e.touches[0].pageY - posY;
        }
    });

    container.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (e.touches.length === 2) {
            let newDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            scale = Math.min(Math.max(1, lastScale * (newDist / dist)), 5);
        } else if (scale > 1) {
            posX = e.touches[0].pageX - startX;
            posY = e.touches[0].pageY - startY;
        }
        previewImg.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }, { passive: false });

    // --- ПОДЕЛИТЬСЯ ---
    document.getElementById('share-doc').onclick = async () => {
        if (navigator.share) await navigator.share({ title: 'Документ', url: window.location.href });
    };
</script>

</body>
</html>
