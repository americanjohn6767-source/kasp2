<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Удостоверение личности</title>
    <style>
        /* Базовые сбросы */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', -apple-system, sans-serif; }
        body { background-color: #fff; color: #333; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        .container { min-height: 100vh; display: flex; flex-direction: column; }

        /* Шапка */
        .header { padding: 10px 16px; background: #fff; }
        .title-bar { display: flex; align-items: center; justify-content: center; position: relative; height: 48px; }
        .back-icon { position: absolute; left: 0; height: 20px; cursor: pointer; }
        .text-title { font-size: 19px; font-weight: 500; color: #4a4a4a; }

        /* ТАБЫ (ИСПРАВЛЕННЫЕ) */
        .tabs-container { padding: 8px 16px 16px; background: #fff; }
        .tabs-wrapper { 
            display: flex; 
            background: #f0f0f0; /* Серый фон подложки */
            border-radius: 12px; 
            padding: 4px; 
            position: relative;
        }
        .tab-btn { 
            flex: 1; 
            text-align: center; 
            padding: 10px 0; 
            font-size: 14px; 
            font-weight: 500;
            color: #7a7a7a; /* Серый текст для неактивной */
            border-radius: 9px; 
            cursor: pointer; 
            transition: all 0.25s ease;
            z-index: 1;
        }
        
        input[type="radio"] { display: none; }

        /* Стиль для АКТИВНОЙ вкладки */
        #tab1:checked ~ .tabs-container label[for="tab1"],
        #tab2:checked ~ .tabs-container label[for="tab2"] { 
            background: #ffffff; /* Белый фон */
            color: #2b6bcc;    /* Синий текст */
            box-shadow: 0 2px 6px rgba(0,0,0,0.1); /* Тень для объема */
        }

        /* Контент вкладок */
        .tab-content { display: none; flex-grow: 1; padding: 0 16px; }
        #tab1:checked ~ #content-doc, 
        #tab2:checked ~ #content-req { display: flex; flex-direction: column; }

        /* Область просмотра фото и ЗУМ */
        #preview-viewport {
            width: 100%;
            height: 60vh;
            background: #fdfdfd;
            border-radius: 16px;
            overflow: hidden; 
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none; /* Отключаем системный зум браузера */
        }
        #preview-img {
            max-width: 100%;
            max-height: 100%;
            will-change: transform;
            transform-origin: center;
            transition: transform 0.1s ease-out;
        }
        .upload-placeholder {
            text-align: center;
            padding: 40px;
            border: 2px dashed #ccc;
            border-radius: 15px;
            color: #888;
        }

        /* Список реквизитов */
        .rekvizit-list { list-style: none; margin-top: 10px; }
        .rekvizit-item { border-bottom: 1px solid #f2f2f2; padding: 12px 0; position: relative; }
        .rekvizit-item label { display: block; color: #a8a8a8; font-size: 12px; margin-bottom: 4px; }
        .rekvizit-item input { width: 90%; border: none; font-size: 17px; color: #333; outline: none; background: transparent; font-weight: 400; }
        .copy-btn { position: absolute; right: 0; bottom: 12px; width: 22px; cursor: pointer; opacity: 0.7; }

        /* Футер и Кнопки */
        .footer { padding: 20px 0; margin-top: auto; }
        .btn-main { 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            border: none; 
            font-size: 16px; 
            font-weight: 500; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 12px; 
            cursor: pointer; 
        }
        .btn-blue { background: #2b6bcc; color: #fff; }
        .btn-outline { background: #fff; color: #2b6bcc; border: 1.5px solid #2b6bcc; }
        .btn-main img { height: 20px; }

        /* Модалка QR */
        .qr-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 1000; align-items: flex-end; }
        .qr-overlay.active { display: flex; }
        .qr-sheet { 
            width: 100%; 
            background: #fff; 
            border-radius: 24px 24px 0 0; 
            padding: 24px; 
            transform: translateY(100%); 
            transition: transform 0.3s ease; 
        }
        .qr-overlay.active .qr-sheet { transform: translateY(0); }
        .qr-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .qr-header h3 { font-size: 20px; color: #333; }
        .qr-body { text-align: center; padding-bottom: 40px; }
        .qr-img { width: 160px; height: 160px; margin: 20px auto; display: block; }
        .qr-code-val { font-size: 34px; font-weight: 800; letter-spacing: 6px; color: #000; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <!-- Управление табами -->
    <input type="radio" id="tab1" name="view" checked>
    <input type="radio" id="tab2" name="view">

    <div class="header">
        <div class="title-bar">
            <img src="arrow.png" class="back-icon" alt="Назад">
            <span class="text-title">Удостоверение личности</span>
        </div>
    </div>

    <div class="tabs-container">
        <div class="tabs-wrapper">
            <label for="tab1" class="tab-btn">Документ</label>
            <label for="tab2" class="tab-btn">Реквизиты</label>
        </div>
    </div>

    <!-- Вкладка 1: Документ -->
    <div id="content-doc" class="tab-content">
        <div id="preview-viewport">
            <input type="file" id="file-selector" accept="image/*" style="display: none;">
            <div id="upload-ui" class="upload-placeholder">
                <p>Нажмите, чтобы загрузить фото удостоверения</p>
                <button class="btn-main btn-blue" style="margin-top:15px;" onclick="document.getElementById('file-selector').click()">Выбрать файл</button>
            </div>
            <img id="preview-img" src="" alt="">
        </div>

        <div class="footer">
            <button class="btn-main btn-blue" id="open-qr-btn">
                <img src="qr.png" alt=""> Предъявить документ
            </button>
            <button class="btn-main btn-outline" id="share-btn">
                <img src="upload.png" alt=""> Отправить документ
            </button>
        </div>
    </div>

    <!-- Вкладка 2: Реквизиты -->
    <div id="content-req" class="tab-content">
        <ul class="rekvizit-list">
            <li class="rekvizit-item"><label>ФИО</label><input type="text" id="f_fio"><img src="copy.png" class="copy-btn"></li>
            <li class="rekvizit-item"><label>ИИН</label><input type="text" id="f_iin"><img src="copy.png" class="copy-btn"></li>
            <li class="rekvizit-item"><label>Дата рождения</label><input type="text" id="f_bday"><img src="copy.png" class="copy-btn"></li>
            <li class="rekvizit-item"><label>Номер документа</label><input type="text" id="f_num"><img src="copy.png" class="copy-btn"></li>
            <li class="rekvizit-item"><label>Дата выдачи</label><input type="text" id="f_d1"><img src="copy.png" class="copy-btn"></li>
            <li class="rekvizit-item"><label>Срок действия</label><input type="text" id="f_d2"><img src="copy.png" class="copy-btn"></li>
        </ul>
        <div class="footer">
            <button class="btn-main btn-outline">
                <img src="upload.png" alt=""> Отправить реквизиты
            </button>
        </div>
    </div>
</div>

<!-- Модалка QR -->
<div class="qr-overlay" id="qr-modal">
    <div class="qr-sheet">
        <div class="qr-header">
            <h3>Удостоверение личности</h3>
            <span id="close-qr" style="font-size: 30px; color: #ccc; cursor: pointer;">&times;</span>
        </div>
        <div class="qr-body">
            <p style="color: #666; font-size: 15px;">Покажите QR-код сотруднику</p>
            <img src="https://qci.qr-code.click/uploads/qr_codes/98Heo8.svg" class="qr-img">
            <p style="color: #999; font-size: 14px; margin-top: 10px;">или скажите код</p>
            <div class="qr-code-val">080824</div>
        </div>
    </div>
</div>

<script>
    // --- ПАМЯТЬ И ЗАГРУЗКА ---
    const fileSelector = document.getElementById('file-selector');
    const previewImg = document.getElementById('preview-img');
    const uploadUI = document.getElementById('upload-ui');

    // Восстановление фото
    const savedPhoto = localStorage.getItem('id_photo');
    if (savedPhoto) {
        previewImg.src = savedPhoto;
        uploadUI.style.display = 'none';
    }

    fileSelector.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = ev.target.result;
                localStorage.setItem('id_photo', data);
                previewImg.src = data;
                uploadUI.style.display = 'none';
                resetZoom();
            };
            reader.readAsDataURL(file);
        }
    });

    // Восстановление текста
    const fields = ['f_fio', 'f_iin', 'f_bday', 'f_num', 'f_d1', 'f_d2'];
    fields.forEach(id => {
        const input = document.getElementById(id);
        input.value = localStorage.getItem(id) || '';
        input.addEventListener('input', () => localStorage.setItem(id, input.value));
    });

    // --- МОДАЛКА ---
    const modal = document.getElementById('qr-modal');
    document.getElementById('open-qr-btn').onclick = () => modal.classList.add('active');
    document.getElementById('close-qr').onclick = () => modal.classList.remove('active');
    modal.onclick = (e) => { if(e.target === modal) modal.classList.remove('active'); };

    // --- ЗУМ И ПЕРЕМЕЩЕНИЕ (УЛУЧШЕННО) ---
    let scale = 1, lastScale = 1;
    let posX = 0, posY = 0, startX = 0, startY = 0, initialDist = 0;
    const view = document.getElementById('preview-viewport');

    function resetZoom() {
        scale = 1; posX = 0; posY = 0;
        previewImg.style.transform = `translate(0,0) scale(1)`;
    }

    view.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            initialDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            lastScale = scale;
        } else if (e.touches.length === 1) {
            startX = e.touches[0].pageX - posX;
            startY = e.touches[0].pageY - posY;
        }
    });

    view.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (e.touches.length === 2) {
            const currentDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            scale = Math.min(Math.max(1, lastScale * (currentDist / initialDist)), 4);
        } else if (e.touches.length === 1 && scale > 1) {
            posX = e.touches[0].pageX - startX;
            posY = e.touches[0].pageY - startY;
        }
        previewImg.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }, { passive: false });

    // Поделиться
    document.getElementById('share-btn').onclick = () => {
        if(navigator.share) navigator.share({title: 'ID', url: ''}).catch(()=>{});
    };
</script>

    <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

</body>
</html>
